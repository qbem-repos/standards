# Jekyll Configuration for QBEM Standards

# Site settings
title: QBEM Standards
description: Padronizações Oficiais para Desenvolvimento de Serviços
baseurl: "/standards"
url: "https://qbem-repos.github.io"

# Repository
repository: qbem-repos/standards

# Theme
theme: jekyll-theme-cayman
remote_theme: pages-themes/cayman@v0.2.0

# Plugins
plugins:
  - jekyll-relative-links
  - jekyll-optional-front-matter
  - jekyll-readme-index
  - jekyll-default-layout
  - jekyll-titles-from-headings

# Relative links settings
relative_links:
  enabled: true
  collections: false

# Optional front matter
optional_front_matter:
  remove_originals: false

# Titles from headings
titles_from_headings:
  enabled: true
  strip_title: true
  collections: false

# Markdown settings
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false

# Include/Exclude
include:
  - README.md
  - CONTRIBUTING.md
  - CODE_OF_CONDUCT.md
  - GOVERNANCE.md
  - SECURITY.md
  - DEVELOPMENT.md

exclude:
  - .github
  - .gitignore
  - LICENSE
  - "*.log"
  - _site
  - .sass-cache
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor

# Collections (for better organization)
collections:
  apis:
    output: true
    permalink: /apis/:path/
  async:
    output: true
    permalink: /async/:path/
  security:
    output: true
    permalink: /security/:path/
  adr:
    output: true
    permalink: /adr/:path/

# Defaults
defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      path: "apis"
    values:
      layout: default
      category: apis
  - scope:
      path: "async"
    values:
      layout: default
      category: async
  - scope:
      path: "security"
    values:
      layout: default
      category: security
  - scope:
      path: "adr"
    values:
      layout: default
      category: adr
