site_name: QBEM Standards
site_description: Padronizações Oficiais para Desenvolvimento de Serviços
site_author: QBEM
site_url: https://qbem-repos.github.io/standards/

repo_name: qbem-repos/standards
repo_url: https://github.com/qbem-repos/standards
edit_uri: edit/main/

docs_dir: .
site_dir: site

theme:
  name: material
  language: pt-BR
  logo: https://images.squarespace-cdn.com/content/v1/6298b052e407667e7e44c2ed/4051d667-ae53-469a-8465-b3598180b2f5/Logo-QBem---Ecossistema-Quiver.png
  favicon: https://images.squarespace-cdn.com/content/v1/6298b052e407667e7e44c2ed/4051d667-ae53-469a-8465-b3598180b2f5/Logo-QBem---Ecossistema-Quiver.png
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Modo escuro
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Modo claro
  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - toc.integrate
    - search.suggest
    - search.highlight
    - search.share
    - content.tabs.link
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.action.view

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
      permalink_title: Link permanente
  - tables
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search:
      lang:
        - pt
        - en
  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago
      timezone: America/Sao_Paulo
      locale: pt
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
      htmlmin_opts:
        remove_comments: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/qbem-repos
      name: QBEM no GitHub
  generator: false

extra_css:
  - .github/docs/extra.css

copyright: Copyright &copy; 2024 QBEM - Licenciado sob MIT License

nav:
  - Início: README.md
  - APIs HTTP:
      - apis/README.md
      - Convenções: apis/conventions.md
      - Modelo de Erros: apis/error-model.md
      - Guia OpenAPI: apis/openapi-style-guide.md
      - Versionamento: apis/versioning.md
  - Mensageria Assíncrona:
      - async/README.md
      - Convenções: async/conventions.md
      - Headers Padrão: async/headers.md
      - Evolução de Schemas: async/schema-evolution.md
      - Confiabilidade: async/reliability.md
      - Segurança: async/security.md
  - Segurança:
      - security/README.md
      - Gestão de Segredos: security/secrets-management.md
      - Autenticação & Autorização: security/auth.md
      - Segurança de APIs: security/api-security.md
      - Proteção de Dados & LGPD: security/data-protection.md
  - Webhooks:
      - webhooks/README.md
  - Observabilidade:
      - observability/README.md
  - Ferramentas:
      - tooling/README.md
  - Checklists:
      - checklists/README.md
  - Frontend:
      - frontend/README.md
  - ADRs:
      - adr/README.md
  - Governança:
      - Governance: GOVERNANCE.md
      - Contributing: CONTRIBUTING.md
      - Code of Conduct: CODE_OF_CONDUCT.md
      - Security: SECURITY.md
